  IwdDrop_02_GiantBouquetShield:
    enabled: true
    order: 2
    label: Огромный букет
    tips: Огромный букет с драматичным студийным светом и кинематографическими тенями.
    best_input: Фото с одним человеком по центру, руки видны (или хотя бы частично),
