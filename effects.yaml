  IwdDrop_03_LovePostcardWall:
    enabled: true
    order: 3
    label: Стена из открыток I love you
    tips: Уютная комната со стеной из открыток «I love you» на разных языках, с марками,
      следами помады и тёплыми гирляндами.
    best_input: 'Портрет/селфи с одним человеком, лицо самое резкое в кадре.; Фон
