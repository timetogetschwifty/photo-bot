      “превратить” в вечер с фонариками.
    category: iwd
  IwdDrop_05_PostcardFromParis:
    enabled: true
    order: 5
    label: Открытка из Парижа
    tips: 'Стиль «открытка из Парижа»: пастельное небо, лёгкое зерно, штамп «I love
      you» и подпись «Wish you were here».'
    best_input: Портрет/селфи, где лицо по центру и хорошо видно.; Любой фон подойдёт
      — он будет стилизован под «Парижскую открытку».; Лучше среднее/хорошее качество,
      чтобы зерно выглядело «плёночным», а не шумом.
    category: iwd
  IwdDrop_06_BloomBurstConfetti:
    enabled: true
    order: 6
    label: Взрыв лепестков
    tips: 'Взрыв лепестков как конфетти-пушка: динамика, лёгкий motion blur и искристые
      блики, при этом лица остаются неизменными.'
    best_input: Групповое фото до 4 человек, лица видны и достаточно резкие.; Подойдёт
