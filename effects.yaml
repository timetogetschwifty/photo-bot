      Хороший свет (дневной/комнатный) помогает «искрам» и лепесткам выглядеть реалистично.
    category: iwd
  IwdDrop_07_WaxSealLove:
    enabled: true
    order: 7
    label: Романтический конверт с печатью
    tips: 'Романтический конверт с красной восковой печатью: сердце и надпись «I love
      you», тёплые блики свечей и мягкое боке.'
    best_input: 'Один человек, лицо хорошо видно; идеально если руки/кисти в кадре.;
      Подойдёт портрет по грудь или ближе, чтобы «конверт» выглядел крупно и чётко.;
      Нормальный свет: так проще сделать «свечной» эффект аккуратно.'
    category: iwd
  IwdDrop_08_VintageFloralFilm:
    enabled: true
    order: 8
    label: Винтажная плёнка 70-х
    tips: 'Винтажная плёнка 70-х: тёплые тона, мягкое зерно, лёгкие засветки и солнечные
