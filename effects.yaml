      туловища видны: открытки будут за спиной.'
    category: iwd
  IwdDrop_04_BloomLanternNight:
    enabled: true
    order: 4
    label: Тёплые фонарики
    tips: Сумерки и тёплые фонарики сверху
    best_input: Фото, где вы в центре кадра (лицо ближе к центру), хорошо видно руки
