  Luxurydrop_01_ChampagneCalmIn:
    enabled: true
    order: 1
    label: Игристое на заднем сиденье
    tips: Вы на заднем сиденье люксового седана ночью — мягкие огни города, приватность,
      спокойное лицо и лёгкий бокал. Выглядит так, будто это ваш обычный вторник.
    best_input: Подойдёт чёткое селфи или портрет по грудь/пояс, без сильных теней
      на лице и без закрывающих очков. Лучше, если лицо занимает заметную часть кадра
      и хорошо видно глаза.
    category: luxurydrop
  Luxurydrop_02_PrivateJetWindow:
    enabled: true
    order: 2
    label: В частном самолете
    tips: Вы сидите у иллюминатора частного джета в мягком закатном/рассветном свете
      — спокойствие на высоте, облака внизу. В кадре главное не самолёт, а ваша дорогая
      тишина.
    best_input: Лучше всего портрет/селфи с нейтральным выражением и хорошей резкостью,
      без сильного наклона головы. Освещение на лице должно быть ровным, чтобы красиво
      легло "золотое окно".
    category: luxurydrop
  Luxurydrop_03_YachtDeckSoft:
    enabled: true
    order: 3
    label: На яхте
    tips: Вы на яхте среди открытого моря — чистая палуба, светлый стиль, лёгкий ветер
      и спокойная улыбка. Роскошь — фоном, а в центре ваша энергия.
    best_input: Подойдёт фото в пол-оборота или прямо, где хорошо видны глаза и контуры
      лица; волосы могут быть распущены — это усилит эффект ветра. Лучше без лишних
      людей на фоне.
    category: luxurydrop
  Luxurydrop_04_SupercarParkedNo:
    enabled: true
    order: 4
    label: Рядом с суперкаром
    tips: ''
    best_input: Лучше фото по пояс или в полный рост с чётким лицом; нейтральное выражение
      отлично подходит. Желательно без ярких логотипов на одежде.
    category: luxurydrop
  Luxurydrop_05_MonacoMarinaMorning:
    enabled: true
    order: 5
    label: Прогулка по марине в Монако
    tips: Вы гуляете по утренней марине на рассвете с кофе — пастельное небо, яхты
      на фоне в мягком блюре. В центре кадра ваша спокойная энергия.
    best_input: Подойдёт портрет или фото по пояс, где лицо чёткое и без сильных пересветов.
      Если исходник со спокойным выражением — получится максимально "утренний вайб".
    category: luxurydrop
  Luxurydrop_06_PenthouseWindowSilence:
    enabled: true
    order: 6
    label: В пентхаусе
    tips: Вы в пентхаусе у огромного окна на фоне вечернего города — минимализм, чистые
      линии, мягкий контровый свет.
    best_input: Лучше портрет с хорошей детализацией лица, без резких теней от лампы
      сверху. Подойдут фото с нейтральным выражением и спокойной позой.
    category: luxurydrop
  Luxurydrop_07_SkiChaletApr:
    enabled: true
    order: 7
    label: У тёплого шале
    tips: Вы у тёплого шале под лёгким снегом — уютные огни, зимняя одежда и спокойный
      взгляд.
    best_input: Подойдёт селфи или портрет с открытым лицом (без маски/очков), чтобы
      снег не "съел" черты. Лучше нейтральное освещение на исходнике.
    category: luxurydrop
  Luxurydrop_08_HelicopterOverThe:
    enabled: true
    order: 8
    label: В вертолёте
    tips: Вы в вертолёте над побережьем — море и берег внизу, внутри лаконично, на
      лице спокойствие.
    best_input: Лучше фото с чётким лицом и открытыми ушами/волосами, чтобы гарнитура
      (если появится) выглядела естественно. Подойдёт спокойное выражение без сильной
      мимики.
    category: luxurydrop
  Luxurydrop_09_LuxuryHobbyPolo:
    enabled: true
    order: 9
    label: На поле для поло
    tips: ''
    best_input: Подойдёт портрет или фото по пояс, где хорошо видно глаза и форму
      лица — это важно для узнаваемости. Лучше без сильного бокового света, чтобы
      "полированная" укладка выглядела естественно.
    category: luxurydrop
  Luxurydrop_10_InfinityPoolSunset:
    enabled: true
    order: 10
    label: В инфинити-бассейне
    tips: Вы в инфинити-бассейне на закате над океаном — тёплый свет, лёгкий блеск
      воды и ощущение "я ушёл от стресса".
    best_input: Лучше портрет/селфи с чётким лицом и открытым подбородком, без закрывающих
      очков. Подойдёт фото с нейтральным спокойным выражением.
    category: luxurydrop
